name: Build Windows EXE

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Write source file (fw.py)
        shell: bash
        run: |
          echo "" | base64 -d > fw.py
          echo '--- fw.py written ---'
          cat fw.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyperclip pynput pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --name fw fw.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: fw-exe
          path: dist/fw.exe
